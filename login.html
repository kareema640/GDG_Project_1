<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exclusive Site</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="top-header">
            <p>Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%! <span>ShopNow</span></p>
            <div class="lang"> English <i class="fa-solid fa-angle-down"></i>
            </div>
        </div>
        <div class="bottom-header hide-icons">
            <p>Exclusive</p>
            <ul class="header-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Contact</a></li>
                <li><a href="#">About</a></li>
                <li class="active"><a href="signup.html">Sign Up</a></li>
            </ul>
            <div class="search-bar">
                <input type="text" name="search" id="search" placeholder="What are you looking for?">
                <button type="button">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div class="header-icons">
                <div class="icon">
                    <a href="#">
                        <img src="images/Vector.svg">
                        <span class="count count-fav">0</span>
                    </a>
                </div>
                <div class="icon">
                    <a href="">
                        <img src="images/Cart1.svg">
                        <span class="count count-item">0</span>
                    </a>
                </div>
            </div>
        </div>
    </header>
    <div class="container">
        <img src="images/login.svg">
        <form>
            <h2>Log in to Exclusive</h2>
            <p>Enter your details below</p>
            <div class="inputs">
                <input type="text" placeholder="Email or Phone Number" id="contact-email" onkeyup="validateEmail()">
                <span id="email-error"></span>
            </div>
            <div class="inputs">
                <input type="password" placeholder="Password" id="contact-password" onkeyup="validatePassword()">
                <span id="password-error"></span>
            </div>
            <div class="form-options">
                <button type="submit" onclick="return validateForm()">Log In</button>
                <a href="#">Forget Password?</a>
            </div>
            <span id="submit-error"></span>
        </form>
    </div>
    <script src="JS/login.js"></script>
</body>

</html>
